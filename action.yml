name: 'recul by CRBroughton'
description: 'Stay N versions behind latest — audit npm dependencies for supply chain safety'
author: 'Craig R Broughton'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  working-directory:
    description: 'Directory containing the recul.config.jsonc and package.json to audit'
    required: false
    default: '.'
  fail-on-violations:
    description: 'Exit with code 1 when violations are found. Set to false for informational runs.'
    required: false
    default: 'true'
  behind-behavior:
    description: 'Override behindBehavior from config (ignore | report)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Run recul
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        RECUL_VERSION=$(node -e "console.log(require('$GITHUB_ACTION_PATH/package.json').version)")
        npm install -g @crbroughton/recul@$RECUL_VERSION
        BEHIND_FLAG=""
        if [ -n "${{ inputs.behind-behavior }}" ]; then
          BEHIND_FLAG="--behindBehavior=${{ inputs.behind-behavior }}"
        fi
        if recul $BEHIND_FLAG; then
          exit 0
        else
          if [ "${{ inputs.fail-on-violations }}" = "true" ]; then
            exit 1
          fi
        fi
